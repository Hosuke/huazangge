# 华藏阁 — Autonomous Learning Server

branding:
  name: "華藏閣"
  name_short: "華"
  tagline: "您的經典知識庫"
  powered_by_label: "Powered by LLMBase"
  powered_by_url: "https://github.com/Hosuke/llmbase"

llm:
  max_tokens: 8192

paths:
  raw: "./raw"
  wiki: "./wiki"
  outputs: "./wiki/outputs"
  meta: "./wiki/_meta"
  concepts: "./wiki/concepts"

compile:
  batch_size: 5
  backlinks: true

search:
  port: 5555

lint:
  web_search: false

worker:
  enabled: true
  learn_source: both
  learn_interval_hours: 6
  learn_batch_size: 10
  compile_interval_hours: 1
  taxonomy_interval_hours: 12
