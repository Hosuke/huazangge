branding:
  name: "華藏閣"
  name_short: "華"
  tagline: "您的經典知識庫"
  powered_by_label: "Powered by LLMBase"
  powered_by_url: "https://github.com/Hosuke/llmbase"

llm:
  max_tokens: 8192

paths:
  raw: "./raw"
  wiki: "./wiki"
  outputs: "./wiki/outputs"
  meta: "./wiki/_meta"
  concepts: "./wiki/concepts"

compile:
  batch_size: 20
  backlinks: true

search:
  port: 5555

lint:
  web_search: false

# 12-hour overnight: wikisource first, then cbeta
worker:
  enabled: true
  learn_source: both
  learn_interval_hours: 0.5
  learn_batch_size: 5
  compile_interval_hours: 0.25
  taxonomy_interval_hours: 12
  health_check_interval_hours: 24

health:
  auto_fix_broken_links: true
  max_stubs_per_run: 10

entities:
  enabled: true
